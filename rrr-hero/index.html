<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RRR Hero - Final Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; outline: none; box-sizing: border-box; }
        body { margin: 0; background: #0b0e1e; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Arial', sans-serif; }
        #game-container { position: relative; width: 450px; height: 100vh; background: #121526; overflow: hidden; border-left: 2px solid #333; border-right: 2px solid #333; }
        
        /* Screens */
        .screen { position: absolute; inset: 0; background: #121526; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 300; padding: 20px; text-align: center; }
        .active { display: flex; }
        .card { background: #1e2337; border-radius: 15px; padding: 15px; width: 100%; margin-bottom: 10px; border: 1px solid #3a3f58; text-align: left; }
        h3 { color: #ffe600; font-size: 14px; margin: 0 0 5px 0; text-transform: uppercase; }
        input[type="text"] { width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: white; border-radius: 8px; margin-bottom: 5px; }
        input[type="file"] { color: #aaa; font-size: 11px; margin-top: 5px; }

        /* UI */
        button { background: #ffe600; color: #000; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin: 5px; }
        .btn-sec { background: #3a3f58; color: white; }
        #ui-header { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); width: 170px; background: rgba(30, 35, 55, 0.95); border-radius: 15px; padding: 10px; text-align: center; border: 2px solid #3a3f58; z-index: 100; display: none; }
        #score-display { color: white; font-size: 40px; font-weight: bold; }
        #high-score-top { color: #ffe600; font-size: 12px; font-weight: bold; }

        /* Gameplay Entities */
        #bird { position: absolute; width: 42px; height: 42px; left: 80px; background-size: cover; border-radius: 8px; z-index: 50; display: none; }
        .pipe { position: absolute; width: 45px; z-index: 10; border: 2px solid #000; background-size: 100% 100%; background-color: #ffe600; }
        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; background: #1e2337; border-radius: 20px; padding: 25px; text-align: center; display: none; z-index: 400; border: 4px solid #ffe600; color: white; }
    </style>
</head>
<body onmousedown="handleInput()" onkeydown="if(event.code==='Space') handleInput()">

    <div id="game-container">
        <div id="home-screen" class="screen active">
            <div id="main-high-score" style="color:white; margin-bottom: 10px;">High Score: 0</div>
            <h1 id="display-title" style="color:#ffe600">RRR HERO</h1>
            <div id="hero-circle" style="width:120px; height:120px; border-radius:50%; border:5px solid #ffe600; margin:20px; background: url('hero.png') center/cover;"></div>
            <button onclick="startGame()">START GAME</button>
            <button class="btn-sec" onclick="openBuilder()">CREATE GAME</button>
            <div id="local-list" style="margin-top:20px; width:100%"></div>
        </div>

        <div id="builder-screen" class="screen" style="justify-content: flex-start; overflow-y: auto;">
            <h2 style="color:#ffe600">NEW HERO</h2>
            <div class="card">
                <h3>1. NAME</h3>
                <input type="text" id="in-id" placeholder="e.g. my-hero-name">
            </div>
            <div class="card">
                <h3>2. IMAGES</h3>
                <label>Bird Image</label><input type="file" id="in-bird" accept="image/*">
                <label>Pipe Image</label><input type="file" id="in-pipe" accept="image/*">
            </div>
            <div class="card">
                <h3>3. SOUND</h3>
                <label>Background MP3</label><input type="file" id="in-bgm" accept="audio/*">
            </div>
            <button id="build-btn" onclick="buildGame()">PUBLISH TO CLOUD</button>
            <button class="btn-sec" onclick="location.reload()">BACK</button>
        </div>

        <div id="ui-header">
            <div id="high-score-top">BEST: 0</div>
            <div id="score-display">0</div>
        </div>
        <div id="bird"></div>

        <div id="game-over" class="overlay">
            <h2 style="margin-top:0">OUT!</h2>
            <img id="go-gif" src="gameover.gif" style="width:100%; border-radius:15px; margin-bottom:15px;">
            <div id="final-score" style="font-size: 22px; font-weight: bold;">SCORE: 0</div>
            <button onclick="location.reload()">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        // --- SUPABASE SETUP ---
        const SB_URL = 'https://tkxazrhpcpkyxpfxvuxf.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRreGF6cmhwY3BreXhwZnh2dXhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNzU3MDIsImV4cCI6MjA4NzY1MTcwMn0.cXNlAnqSONG5zv2HIFUreXp_3rg47x3NdQ-3FA5TxFE';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        const REPO_DEFAULTS = { bird: 'hero.png', pipe: 'pipe.png', gif: 'gameover.gif', bgm: 'bgm.mp3', tap: 'tap.mp3', hit: 'hit.mp3', voice: 'voice.mp3' };
        let active = { ...REPO_DEFAULTS };
        const audio = { bgm: new Audio(), tap: new Audio(), hit: new Audio(), voice: new Audio() };
        
        // --- GAME STATE ---
        let birdY, velocity, gravity = 0.55, score = 0, isGameOver = false, pipes = [], animationId;
        let highScore = localStorage.getItem('rrr_highScore') || 0;

        async function init() {
            const id = new URLSearchParams(window.location.search).get('id');
            if (id) {
                const { data } = await supabaseClient.from('games').select('config').eq('id', id).single();
                if (data) {
                    active = { ...REPO_DEFAULTS, ...data.config };
                    document.getElementById('display-title').innerText = id.toUpperCase();
                    document.getElementById('hero-circle').style.backgroundImage = `url(${active.bird})`;
                }
            }
            document.getElementById('main-high-score').innerText = "High Score: " + highScore;
            document.getElementById('high-score-top').innerText = "BEST: " + highScore;
            renderLocal();
        }
        init();

        function renderLocal() {
            const local = JSON.parse(localStorage.getItem('rrr_local') || '[]');
            document.getElementById('local-list').innerHTML = local.map(n => 
                `<button class="btn-sec" style="width:100%" onclick="location.href='?id=${n}'">🎮 ${n}</button>`
            ).join('');
        }

        function openBuilder() {
            const local = JSON.parse(localStorage.getItem('rrr_local') || '[]');
            if (local.length >= 3) return alert("Limit: 3 custom games per device.");
            document.getElementById('home-screen').classList.remove('active');
            document.getElementById('builder-screen').classList.add('active');
        }

        async function buildGame() {
            const gid = document.getElementById('in-id').value.trim().toLowerCase().replace(/\s/g, '');
            if (!gid) return alert("Give your game a name!");
            const btn = document.getElementById('build-btn');
            btn.innerText = "UPLOADING..."; btn.disabled = true;

            let config = { id: gid };
            const keys = ['bird','pipe','bgm'];

            for (const key of keys) {
                const file = document.getElementById('in-'+key).files[0];
                if (file) {
                    const path = `${gid}/${key}-${Date.now()}`;
                    const { data } = await supabaseClient.storage.from('game-assets').upload(path, file);
                    if (data) {
                        const { data: pUrl } = supabaseClient.storage.from('game-assets').getPublicUrl(path);
                        config[key] = pUrl.publicUrl;
                    }
                }
            }

            const { error } = await supabaseClient.from('games').insert([{ id: gid, config: config }]);
            if (!error) {
                const local = JSON.parse(localStorage.getItem('rrr_local') || '[]');
                local.push(gid);
                localStorage.setItem('rrr_local', JSON.stringify(local));
                window.location.href = `?id=${gid}`;
            } else {
                alert("Name taken or error occurred.");
                btn.disabled = false; btn.innerText = "PUBLISH TO CLOUD";
            }
        }

        // --- ENGINE ---
        function startGame() {
            document.getElementById('home-screen').classList.remove('active');
            document.getElementById('ui-header').style.display = 'block';
            document.getElementById('bird').style.display = 'block';
            document.getElementById('bird').style.backgroundImage = `url(${active.bird})`;
            
            audio.bgm.src = active.bgm; audio.bgm.loop = true; audio.bgm.play().catch(()=>{});
            audio.tap.src = active.tap; audio.hit.src = active.hit; audio.voice.src = active.voice;

            birdY = window.innerHeight / 2; velocity = 0; score = 0; isGameOver = false;
            createPipe();
            update();
        }

        function handleInput() { if (!isGameOver) { velocity = -8.5; audio.tap.currentTime = 0; audio.tap.play().catch(()=>{}); } }

        function createPipe() {
            const h = window.innerHeight, gap = 155, topH = Math.random() * (h - 350) + 100;
            const t = document.createElement('div'); t.className='pipe'; t.style.height=topH+'px'; t.style.top='0'; t.style.left='450px';
            t.style.backgroundImage=`url(${active.pipe})`;
            const b = document.createElement('div'); b.className='pipe'; b.style.height=(h-topH-gap)+'px'; b.style.bottom='0'; b.style.left='450px';
            b.style.backgroundImage=`url(${active.pipe})`;
            document.getElementById('game-container').append(t, b);
            pipes.push({t, b, x: 450, passed: false});
        }

        function update() {
            if (isGameOver) return;
            velocity += gravity; birdY += velocity;
            const bElem = document.getElementById('bird');
            bElem.style.top = birdY + 'px';
            bElem.style.transform = `rotate(${velocity * 3}deg)`;

            if (birdY < 0 || birdY > window.innerHeight - 40) return endGame();

            pipes.forEach((p, i) => {
                p.x -= 5; p.t.style.left = p.b.style.left = p.x + 'px';
                const br = bElem.getBoundingClientRect(), tr = p.t.getBoundingClientRect(), btr = p.b.getBoundingClientRect();
                if (br.right > tr.left && br.left < tr.right && (br.top < tr.bottom || br.bottom > btr.top)) return endGame();
                if (p.x < 80 && !p.passed) { score++; p.passed = true; document.getElementById('score-display').innerText = score; }
                if (p.x < -60) { p.t.remove(); p.b.remove(); pipes.splice(i, 1); }
            });

            if (pipes.length === 0 || pipes[pipes.length-1].x < 210) createPipe();
            animationId = requestAnimationFrame(update);
        }

        function endGame() {
            isGameOver = true; cancelAnimationFrame(animationId);
            audio.bgm.pause(); audio.hit.play().catch(()=>{}); audio.voice.play().catch(()=>{});
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('rrr_highScore', highScore);
            }
            document.getElementById('go-gif').src = active.gif;
            document.getElementById('final-score').innerText = "SCORE: " + score;
            document.getElementById('game-over').style.display = 'block';
        }
    </script>
</body>
</html>
